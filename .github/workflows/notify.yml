name: Telegram Notification after Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/blog/**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Telegram Notification
        run: |
          SLUG=$(git diff HEAD~1 --name-only | grep "^content/blog/" | head -1 | sed 's|content/blog/||;s|\.mdx||')
          if [ -n "$SLUG" ]; then
            TITLE=$(head -5 content/blog/$SLUG.mdx | grep "^title:" | sed 's/title: *"\?//;s/"\?$//')
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\":\"7361053689\",\"text\":\"✅ SteuerFluss Blog live:\\n\\n$TITLE\\n\\n🔗 https://steuer-fluss.de/blog/$SLUG\"}"
          fi
